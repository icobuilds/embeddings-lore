database:
  host: localhost
  port: 3306
  # user is read from EMBLORE_DB__USER env var (do not hard-code here)
  # password is read from EMBLORE_DB__PASSWORD env var (do not hard-code here)
  # database is read from EMBLORE_DB__DATABASE env var (do not hard-code here)
  # table is read from EMBLORE_DB__TABLE env var (do not hard-code here)


embedding:
  candidate_id: id 
  fields:
    - title 
    - authors
    - synopsis
    - subjects
  template: "{title}. By {authors}. {synopsis}. Topics: {subjects}"

models:
  - name: minilm
    path: sentence-transformers/all-MiniLM-L6-v2
  - name: mpnet
    path: sentence-transformers/all-mpnet-base-v2
  - name: bge-small
    path: BAAI/bge-small-en-v1.5
  - name: e5-small
    path: intfloat/e5-small-v2
  - name: multilingual-e5-base
    path: intfloat/multilingual-e5-base
  - name: multilingual-e5-small
    path: intfloat/multilingual-e5-small
  - name: jina-v4
    path: jinaai/jina-embeddings-v4

index:
  storage_dir: indexes/
  batch_size: 256
